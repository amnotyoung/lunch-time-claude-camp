<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{width:720pt;height:405pt;font-family:'Inter','SF Pro',system-ui,-apple-system,sans-serif;background:#F8F8F2;display:grid;grid-template-columns:1.55fr 1fr;grid-template-rows:auto 1fr auto;gap:10pt;padding:20pt;overflow:hidden}
  .cell{border-radius:14pt;padding:18pt 22pt;overflow:hidden}
  .head{grid-column:1/3;background:#1A1A2E;color:#F8F8F2;display:flex;align-items:center;justify-content:space-between;padding:13pt 22pt}
  .head .wk{display:flex;align-items:baseline;gap:11pt}
  .head .wn{font-size:11pt;font-weight:800;color:#E8FF3B;letter-spacing:0.3pt}
  .head h2{font-size:19pt;font-weight:600;letter-spacing:-0.3pt}
  .head .num{font-size:9.5pt;font-weight:600;color:#A0A0B0;letter-spacing:0.15pt}
  .anchor{background:#1A1A2E;color:#F8F8F2;display:flex;flex-direction:column;justify-content:center}
  .anchor .lab{font-size:8.5pt;font-weight:700;letter-spacing:0.2pt;text-transform:uppercase;color:#E8FF3B;margin-bottom:9pt}
  .anchor h3{font-size:25pt;font-weight:800;letter-spacing:-0.6pt;line-height:1.14;margin-bottom:13pt}
  .anchor h3 b{color:#E8FF3B}
  .anchor .pts{display:flex;flex-direction:column;gap:6pt}
  .anchor .pt{font-size:10pt;font-weight:500;line-height:1.4;color:#F8F8F2;padding-left:14pt;position:relative}
  .anchor .pt::before{content:"";position:absolute;left:0;top:5pt;width:5pt;height:5pt;border-radius:50%;background:#4ECDC4}
  .anchor .pt b{color:#E8FF3B;font-weight:700}
  .side{background:#FF6B9D;color:#1A1A2E;display:flex;flex-direction:column;justify-content:center;gap:9pt}
  .side .stag{font-size:8pt;font-weight:800;letter-spacing:0.25pt;text-transform:uppercase;opacity:0.65}
  .side .chip{font-size:10.5pt;font-weight:700;line-height:1.25;display:flex;gap:7pt;align-items:center}
  .side .chip .n{font-weight:800;color:#E8FF3B;background:#1A1A2E;border-radius:5pt;padding:2pt 7pt;font-size:9pt;flex-shrink:0}
  .foot{grid-column:1/3;background:#FFE66D;color:#1A1A2E;font-size:12pt;font-weight:600;padding:11pt 22pt;border-radius:14pt;display:flex;align-items:center;gap:11pt}
  .foot .fl{font-size:8.5pt;font-weight:800;text-transform:uppercase;letter-spacing:0.2pt;opacity:0.55}
  .foot b{font-weight:800}
</style>
</head>
<body>
  <div class="cell head">
    <div class="wk"><span class="wn">WEEK 3</span><h2>외부 도구 연결 (MCP)</h2></div>
    <span class="num">05 / 14</span>
  </div>
  <div class="cell anchor">
    <div>
      <p class="lab">한 줄 핵심</p>
      <h3>MCP로 <b>외부 도구</b>를 연결한다</h3>
      <div class="pts">
        <div class="pt">두 길 — <b>앱 내장 커넥터</b> / <b>GitHub repo 주소</b> 한 줄</div>
        <div class="pt">연결할수록 클로드가 할 수 있는 일이 늘어난다</div>
      </div>
    </div>
  </div>
  <div class="cell side">
    <span class="stag">연결 예 · koica-reg</span>
    <div class="chip"><span class="n">①</span>규정 1,660조문 검색</div>
    <div class="chip"><span class="n">②</span>인용 검증 (환각 방지)</div>
    <div class="chip"><span class="n">③</span>"이 주소 연결해줘"</div>
  </div>
  <div class="cell foot">
    <span class="fl">한 줄 요약</span>
    <span><b>"이 주소 도구 연결해줘"</b> → 생태계가 열린다</span>
  </div>
</body>
</html>
