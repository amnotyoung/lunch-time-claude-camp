<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{width:720pt;height:405pt;font-family:'Inter','SF Pro',system-ui,-apple-system,sans-serif;background:#F8F8F2;display:grid;grid-template-columns:1.5fr 1fr;grid-template-rows:auto 1fr auto;gap:10pt;padding:20pt;overflow:hidden}
  .cell{border-radius:14pt;padding:18pt 22pt;overflow:hidden}
  .head{grid-column:1/3;background:#1A1A2E;color:#F8F8F2;display:flex;align-items:center;justify-content:space-between;padding:13pt 22pt}
  .head h2{font-size:19pt;font-weight:600;letter-spacing:-0.3pt}
  .head .num{font-size:9.5pt;font-weight:600;color:#E8FF3B;letter-spacing:0.15pt}
  .journey{background:#1A1A2E;color:#F8F8F2;display:flex;flex-direction:column;justify-content:center}
  .journey .lab{font-size:8.5pt;font-weight:800;text-transform:uppercase;letter-spacing:0.2pt;color:#E8FF3B;margin-bottom:12pt}
  .chips{display:flex;flex-wrap:wrap;gap:7pt}
  .chips .j{display:flex;align-items:center;gap:6pt;background:#0F0F1A;border-radius:8pt;padding:7pt 11pt;font-size:9.5pt;font-weight:700}
  .chips .j .n{color:#E8FF3B;font-weight:800}
  .chips .j.last{background:#E8FF3B;color:#1A1A2E}
  .chips .j.last .n{color:#1A1A2E}
  .next{background:#E8FF3B;color:#1A1A2E;display:flex;flex-direction:column;justify-content:center}
  .next .lab{font-size:8.5pt;font-weight:800;text-transform:uppercase;letter-spacing:0.2pt;opacity:0.55;margin-bottom:9pt}
  .next h4{font-size:18pt;font-weight:800;line-height:1.18;margin-bottom:10pt;letter-spacing:-0.5pt}
  .next p{font-size:10.5pt;font-weight:600;line-height:1.45}
  .next p b{font-weight:800}
  .reassure{grid-column:1/3;background:#4ECDC4;color:#1A1A2E;padding:12pt 22pt;display:flex;align-items:center;gap:11pt}
  .reassure .ic{font-size:15pt;flex-shrink:0}
  .reassure p{font-size:11pt;font-weight:600;line-height:1.4}
  .reassure p b{font-weight:800}
</style>
</head>
<body>
  <div class="cell head">
    <h2>8주의 여정 — 그리고 다음</h2>
    <span class="num">14 / 14</span>
  </div>
  <div class="cell journey">
    <p class="lab">도구 하나에서 → AI 팀으로</p>
    <div class="chips">
      <span class="j"><span class="n">1</span>채팅vs코드</span>
      <span class="j"><span class="n">2</span>환경 구성</span>
      <span class="j"><span class="n">3</span>MCP</span>
      <span class="j"><span class="n">4</span>스킬</span>
      <span class="j"><span class="n">5</span>git</span>
      <span class="j"><span class="n">6</span>에이전트팀</span>
      <span class="j"><span class="n">7</span>GitHub</span>
      <span class="j last"><span class="n">8</span>이종 협업</span>
    </div>
  </div>
  <div class="cell next">
    <p class="lab">오늘의 메타</p>
    <h4>이 복습조차<br>두 AI가 만들었다</h4>
    <p>이제 도구 하나가 아니라 <b>AI 팀을 부린다</b></p>
  </div>
  <div class="cell reassure">
    <span class="ic">🌱</span>
    <p>8주간 <b>고생 많으셨습니다</b> — 나머지는 차차 <b>learning by doing</b>, 직접 해보며 익히면 된다</p>
  </div>
</body>
</html>
