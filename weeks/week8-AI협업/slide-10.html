<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{width:720pt;height:405pt;font-family:'Inter','SF Pro',system-ui,-apple-system,sans-serif;background:#F8F8F2;display:grid;grid-template-columns:1fr 1fr;grid-template-rows:auto auto 1fr auto;gap:10pt;padding:20pt;overflow:hidden}
  .cell{border-radius:14pt;padding:16pt 20pt;overflow:hidden}
  .head{grid-column:1/3;background:#1A1A2E;color:#F8F8F2;display:flex;align-items:center;justify-content:space-between;padding:13pt 22pt}
  .head h2{font-size:19pt;font-weight:600;letter-spacing:-0.3pt}
  .head .num{font-size:9.5pt;font-weight:600;color:#E8FF3B;letter-spacing:0.15pt}
  .hero{grid-column:1/3;background:#E8FF3B;color:#1A1A2E;display:flex;align-items:center;justify-content:center;padding:16pt;text-align:center}
  .hero h1{font-size:25pt;font-weight:800;letter-spacing:-0.6pt;line-height:1.2}
  .hero h1 b{background:#1A1A2E;color:#E8FF3B;padding:1pt 9pt;border-radius:7pt}
  .card{display:flex;flex-direction:column;justify-content:center}
  .card .role{font-size:8.5pt;font-weight:800;text-transform:uppercase;letter-spacing:0.2pt;margin-bottom:7pt}
  .card h3{font-size:18pt;font-weight:800;letter-spacing:-0.4pt;margin-bottom:7pt;line-height:1.1}
  .card p{font-size:9.7pt;font-weight:500;line-height:1.4}
  .card p b{font-weight:800}
  .claude{background:#1A1A2E;color:#F8F8F2}
  .claude .role{color:#E8FF3B}
  .claude p b{color:#E8FF3B}
  .codex{background:#4ECDC4;color:#1A1A2E}
  .codex .role{opacity:0.6}
  .band{grid-column:1/3;background:#272729;color:#F8F8F2;font-size:9.7pt;font-weight:500;padding:11pt 22pt;border-radius:14pt;display:flex;align-items:center;gap:12pt;line-height:1.35}
  .band b{color:#E8FF3B;font-weight:700}
  .band .pill{font-size:8.5pt;font-weight:800;text-transform:uppercase;letter-spacing:0.2pt;padding:3pt 10pt;border-radius:6pt;background:#FF6B9D;color:#1A1A2E;white-space:nowrap;flex-shrink:0}
</style>
</head>
<body>
  <div class="cell head">
    <h2>그런데 — 이 복습, 누가 만들었나</h2>
    <span class="num">10 / 14</span>
  </div>
  <div class="cell hero">
    <h1>방금 그 7장, 사람이 한 장씩? <b>아닙니다</b></h1>
  </div>
  <div class="cell card claude">
    <span class="role">제작</span>
    <h3>클로드</h3>
    <p>코드 탭에서 wrap-up 슬라이드를 만들어 <b>커밋·PR</b>로 올림</p>
  </div>
  <div class="cell card codex">
    <span class="role">검수</span>
    <h3>챗지피티 · 코덱스</h3>
    <p>그 PR을 <b>다른 눈으로 검수</b>해 의견을 남김</p>
  </div>
  <div class="cell band">
    <span class="pill">동종 → 이종</span>
    <span>week6은 <b>같은 Claude끼리</b> 팀이었다면, 오늘은 <b>다른 회사 AI 둘</b>이 GitHub에서 협업</span>
  </div>
</body>
</html>
