<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{width:720pt;height:405pt;font-family:'Inter','SF Pro',system-ui,-apple-system,sans-serif;background:#F8F8F2;display:grid;grid-template-columns:1.6fr 1fr;grid-template-rows:1fr 1fr;gap:10pt;padding:20pt;overflow:hidden}
  .cell{border-radius:14pt;padding:24pt;display:flex;flex-direction:column;justify-content:space-between;overflow:hidden}
  .anchor{grid-row:1/3;background:#1A1A2E;color:#F8F8F2}
  .y{background:#E8FF3B;color:#1A1A2E}
  .t{background:#4ECDC4;color:#1A1A2E}
  h1{font-size:33pt;font-weight:600;letter-spacing:-0.5pt;line-height:1.18}
  .badge{display:inline-block;background:#E8FF3B;color:#1A1A2E;font-size:10pt;font-weight:600;padding:4pt 12pt;border-radius:9999pt;letter-spacing:0.2pt;margin-bottom:14pt}
  .sub{font-size:11pt;font-weight:400;color:#A0A0B0;margin-top:14pt}
  .y h2{font-size:14pt;font-weight:600;letter-spacing:-0.2pt}
  .y .num{font-size:62pt;font-weight:700;letter-spacing:-2pt;line-height:1}
  .t h2{font-size:13pt;font-weight:600}
  .t p{font-size:10.5pt;font-weight:400;line-height:1.4;margin-top:4pt}
</style>
</head>
<body>
  <div class="cell anchor">
    <div>
      <span class="badge">SESSION 08 · FINALE</span>
      <h1>클로드와 챗지피티를<br>협업시켜보자</h1>
    </div>
    <p class="sub">Claude × ChatGPT · 두 AI가 함께 만든 8주의 마무리</p>
  </div>
  <div class="cell y">
    <h2>WEEK</h2>
    <span class="num">08</span>
  </div>
  <div class="cell t">
    <h2>2026.6.29주</h2>
    <p>점심시간<br>클로드 캠프 · FINALE</p>
  </div>
</body>
</html>
