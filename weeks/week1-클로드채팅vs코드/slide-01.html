<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 720pt;
      height: 405pt;
      font-family: 'Pretendard', sans-serif;
      background: #F5F500;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .badge {
      display: inline-block;
      padding: 4pt 12pt;
      background: #000;
      color: #F5F500;
      font-size: 9pt;
      font-weight: 700;
      font-family: 'Courier New', monospace;
      letter-spacing: 0.1em;
    }
    .card {
      border: 3pt solid #000;
      box-shadow: 6pt 6pt 0 #000;
    }
  </style>
</head>
<body>
  <!-- 상단 헤더 바 -->
  <div style="background: #000; padding: 8pt 40pt; display: flex; justify-content: space-between; align-items: center;">
    <p style="font-family: 'Courier New', monospace; font-size: 9pt; color: #F5F500; letter-spacing: 0.15em;">점심시간 클로드 캠프</p>
    <p style="font-family: 'Courier New', monospace; font-size: 9pt; color: #F5F500; letter-spacing: 0.1em;">2026.04.27 — WEEK #1</p>
  </div>

  <!-- 메인 콘텐츠 -->
  <div style="flex: 1; padding: 36pt 40pt 28pt; display: flex; flex-direction: column; justify-content: space-between;">
    <!-- 타이틀 영역 -->
    <div style="overflow: visible;">
      <div class="badge" style="margin-bottom: 16pt;">SESSION 01</div>
      <h1 style="font-size: 30pt; font-weight: 900; color: #000; line-height: 1.08; letter-spacing: -0.02em; max-width: 580pt; overflow: visible; padding-bottom: 4pt;">
        클로드 채팅과<br>클로드 코드는<br>뭐가 다른가
      </h1>
    </div>

    <!-- 하단 장식 영역 -->
    <div style="display: flex; align-items: flex-end; justify-content: space-between;">
      <div class="card" style="background: #fff; padding: 10pt 18pt; display: inline-flex; align-items: center; gap: 10pt;">
        <div style="width: 10pt; height: 10pt; background: #FF2D55; border: 2pt solid #000;"></div>
        <p style="font-family: 'Courier New', monospace; font-size: 10pt; font-weight: 700; color: #000;">Claude Chat vs Claude Code</p>
      </div>
      <div style="font-size: 88pt; font-weight: 900; color: #000; opacity: 0.08; line-height: 1; user-select: none;">01</div>
    </div>
  </div>
</body>
</html>
