<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 720pt;
      height: 405pt;
      font-family: 'Pretendard', sans-serif;
      background: #000;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
  </style>
</head>
<body>
  <!-- 상단 레이블 -->
  <div style="padding: 12pt 40pt; display: flex; justify-content: space-between; align-items: center;">
    <p style="font-family: 'Courier New', monospace; font-size: 8pt; color: #555; letter-spacing: 0.15em;">CLAUDE CODE IS DIFFERENT</p>
    <p style="font-family: 'Courier New', monospace; font-size: 8pt; color: #555;">03 / 09</p>
  </div>

  <!-- 메인 -->
  <div style="flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 0 48pt; text-align: center; gap: 18pt; overflow: visible;">
    <!-- 노란 태그 -->
    <div style="border: 3pt solid #F5F500; box-shadow: 5pt 5pt 0 #F5F500; padding: 8pt 24pt; display: inline-block;">
      <p style="font-family: 'Courier New', monospace; font-size: 10pt; font-weight: 700; color: #F5F500; letter-spacing: 0.15em;">핵심 차이</p>
    </div>

    <!-- 메인 메시지 -->
    <h1 style="font-size: 32pt; font-weight: 900; color: #fff; line-height: 1.08; letter-spacing: -0.02em; overflow: visible; padding-bottom: 4pt;">
      AI가 내 컴퓨터에서<br>
      <span style="color: #F5F500;">직접</span> 일한다
    </h1>

    <!-- 서브 -->
    <p style="font-family: 'Courier New', monospace; font-size: 12pt; color: #666; letter-spacing: 0.05em;">
      더 이상 복붙하지 않아도 된다
    </p>
  </div>

  <!-- 하단 -->
  <div style="padding: 12pt 40pt; border-top: 1pt solid #222; display: flex; justify-content: center; gap: 40pt;">
    <p style="font-family: 'Courier New', monospace; font-size: 9pt; color: #444;">① 파일 읽기·쓰기</p>
    <p style="font-family: 'Courier New', monospace; font-size: 9pt; color: #444;">② 명령어 실행</p>
    <p style="font-family: 'Courier New', monospace; font-size: 9pt; color: #444;">③ 도구 연결 (MCP)</p>
    <p style="font-family: 'Courier New', monospace; font-size: 9pt; color: #444;">④ 기억·학습</p>
  </div>
</body>
</html>
