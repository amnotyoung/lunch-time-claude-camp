<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 720pt;
      height: 405pt;
      font-family: 'Pretendard', sans-serif;
      background: #000;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .card {
      border: 3pt solid #F5F500;
      box-shadow: 5pt 5pt 0 #F5F500;
    }
  </style>
</head>
<body>
  <!-- 상단 -->
  <div style="padding: 12pt 40pt; display: flex; justify-content: space-between; align-items: center;">
    <p style="font-family: 'Courier New', monospace; font-size: 8pt; color: #555; letter-spacing: 0.15em;">NEXT WEEK PREVIEW</p>
    <p style="font-family: 'Courier New', monospace; font-size: 8pt; color: #555;">09 / 09</p>
  </div>

  <!-- 메인 -->
  <div style="flex: 1; padding: 8pt 40pt 0; display: flex; gap: 36pt; align-items: center;">
    <!-- 왼쪽: 복습 요약 -->
    <div style="width: 270pt; display: flex; flex-direction: column; gap: 10pt;">
      <p style="font-family: 'Courier New', monospace; font-size: 8pt; color: #555; letter-spacing: 0.1em;">TODAY'S RECAP</p>
      <div style="display: flex; flex-direction: column; gap: 6pt;">
        <div style="display: flex; gap: 10pt; align-items: center;">
          <div style="width: 20pt; height: 20pt; background: #F5F500; border: 2pt solid #F5F500; display: flex; align-items: center; justify-content: center; min-width: 20pt;">
            <p style="font-family: 'Courier New', monospace; font-size: 8pt; font-weight: 700; color: #000;">01</p>
          </div>
          <p style="font-size: 11pt; color: #fff;">파일을 직접 읽고 쓴다</p>
        </div>
        <div style="display: flex; gap: 10pt; align-items: center;">
          <div style="width: 20pt; height: 20pt; background: #F5F500; border: 2pt solid #F5F500; display: flex; align-items: center; justify-content: center; min-width: 20pt;">
            <p style="font-family: 'Courier New', monospace; font-size: 8pt; font-weight: 700; color: #000;">02</p>
          </div>
          <p style="font-size: 11pt; color: #fff;">명령어를 직접 실행한다</p>
        </div>
        <div style="display: flex; gap: 10pt; align-items: center;">
          <div style="width: 20pt; height: 20pt; background: #F5F500; border: 2pt solid #F5F500; display: flex; align-items: center; justify-content: center; min-width: 20pt;">
            <p style="font-family: 'Courier New', monospace; font-size: 8pt; font-weight: 700; color: #000;">03</p>
          </div>
          <p style="font-size: 11pt; color: #fff;">MCP로 도구를 연결한다</p>
        </div>
        <div style="display: flex; gap: 10pt; align-items: center;">
          <div style="width: 20pt; height: 20pt; background: #F5F500; border: 2pt solid #F5F500; display: flex; align-items: center; justify-content: center; min-width: 20pt;">
            <p style="font-family: 'Courier New', monospace; font-size: 8pt; font-weight: 700; color: #000;">04</p>
          </div>
          <p style="font-size: 11pt; color: #fff;">기억하고 학습한다</p>
        </div>
      </div>
    </div>

    <!-- 구분선 -->
    <div style="width: 2pt; background: #333; align-self: stretch; margin: 8pt 0;"></div>

    <!-- 오른쪽: 다음 주 -->
    <div style="flex: 1; display: flex; flex-direction: column; gap: 14pt;">
      <p style="font-family: 'Courier New', monospace; font-size: 8pt; color: #555; letter-spacing: 0.1em;">NEXT — WEEK #2</p>
      <div class="card" style="padding: 18pt 20pt;">
        <p style="font-family: 'Courier New', monospace; font-size: 9pt; color: #F5F500; margin-bottom: 8pt; letter-spacing: 0.1em;">5월 04일 주</p>
        <h2 style="font-size: 20pt; font-weight: 900; color: #fff; line-height: 1.3;">클로드 코드<br>사용 환경을<br>구성해보자</h2>
      </div>
      <p style="font-family: 'Courier New', monospace; font-size: 10pt; color: #666;">설치부터 첫 실행까지 같이 해봅니다</p>
    </div>
  </div>

  <!-- 하단 질문 -->
  <div style="padding: 14pt 40pt; border-top: 1pt solid #222; display: flex; justify-content: center;">
    <p style="font-size: 13pt; font-weight: 700; color: #F5F500; letter-spacing: 0.05em;">질문 받겠습니다 🙋</p>
  </div>
</body>
</html>
