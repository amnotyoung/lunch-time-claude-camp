<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 720pt;
      height: 405pt;
      font-family: 'Pretendard', sans-serif;
      background: #fff;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .memory-card {
      border: 3pt solid #000;
      box-shadow: 4pt 4pt 0 #000;
      padding: 12pt 14pt;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 8pt;
    }
  </style>
</head>
<body>
  <!-- 헤더 -->
  <div style="background: #000; padding: 8pt 40pt; display: flex; justify-content: space-between; align-items: center;">
    <div style="display: flex; align-items: center; gap: 12pt;">
      <div style="background: #FF2D55; padding: 3pt 10pt;">
        <p style="font-family: 'Courier New', monospace; font-size: 8pt; font-weight: 700; color: #fff;">DIFF 04</p>
      </div>
      <p style="font-family: 'Courier New', monospace; font-size: 9pt; color: #fff;">기억하고 학습한다</p>
    </div>
    <p style="font-family: 'Courier New', monospace; font-size: 9pt; color: #555;">07 / 09</p>
  </div>

  <div style="flex: 1; padding: 20pt 40pt 18pt; display: flex; gap: 24pt; align-items: flex-start;">
    <!-- 왼쪽: 핵심 메시지 -->
    <div style="width: 210pt; display: flex; flex-direction: column; justify-content: center; gap: 12pt; padding-top: 8pt;">
      <h2 style="font-size: 20pt; font-weight: 900; color: #000; line-height: 1.2;">매번 처음부터<br>설명 안 해도 된다</h2>
      <p style="font-size: 11pt; color: #444; line-height: 1.6;">프로젝트 맥락을 기억해서,<br>다음에 열어도 바로 이어서 작업</p>
      <div style="border: 3pt solid #000; box-shadow: 4pt 4pt 0 #000; background: #F5F500; padding: 9pt 12pt;">
        <p style="font-family: 'Courier New', monospace; font-size: 10pt; font-weight: 700; color: #000;">"우리 팀 규칙 알지?" → 알아</p>
      </div>
    </div>

    <!-- 오른쪽: 3가지 기억 방식 -->
    <div style="flex: 1; display: flex; flex-direction: column; gap: 10pt;">
      <p style="font-family: 'Courier New', monospace; font-size: 8pt; color: #999; letter-spacing: 0.1em;">기억하는 방법 3가지</p>
      <div style="display: flex; gap: 10pt; flex: 1;">

        <!-- CLAUDE.md -->
        <div class="memory-card" style="background: #fff;">
          <div style="background: #000; padding: 5pt 10pt; display: inline-block;">
            <p style="font-family: 'Courier New', monospace; font-size: 9pt; color: #F5F500; font-weight: 700;">CLAUDE.md</p>
          </div>
          <p style="font-size: 11pt; font-weight: 900; color: #000;">프로젝트 규칙</p>
          <p style="font-size: 10pt; color: #555; font-family: 'Courier New', monospace; line-height: 1.5;">코딩 스타일, 금지 사항,<br>팀 컨벤션 등 저장</p>
          <p style="font-size: 9pt; color: #888; font-style: italic;">한 번 써두면 영구적용</p>
        </div>

        <!-- 메모리 -->
        <div class="memory-card" style="background: #fff;">
          <div style="background: #000; padding: 5pt 10pt; display: inline-block;">
            <p style="font-family: 'Courier New', monospace; font-size: 9pt; color: #CCFF00; font-weight: 700;">Memory</p>
          </div>
          <p style="font-size: 11pt; font-weight: 900; color: #000;">핵심 정보 기억</p>
          <p style="font-size: 10pt; color: #555; font-family: 'Courier New', monospace; line-height: 1.5;">중요한 사실·선호를<br>세션 간 기억</p>
          <p style="font-size: 9pt; color: #888; font-style: italic;">"지난 DB 구조" 기억함</p>
        </div>

        <!-- 스킬 -->
        <div class="memory-card" style="background: #fff;">
          <div style="background: #000; padding: 5pt 10pt; display: inline-block;">
            <p style="font-family: 'Courier New', monospace; font-size: 9pt; color: #FF2D55; font-weight: 700;">Skills</p>
          </div>
          <p style="font-size: 11pt; font-weight: 900; color: #000;">반복 자동화</p>
          <p style="font-size: 10pt; color: #555; font-family: 'Courier New', monospace; line-height: 1.5;">자주 쓰는 작업을<br>명령어 하나로 저장</p>
          <p style="font-size: 9pt; color: #888; font-style: italic;">/slides-grab 처럼</p>
        </div>

      </div>
    </div>
  </div>
</body>
</html>
