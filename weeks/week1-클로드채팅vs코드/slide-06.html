<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 720pt;
      height: 405pt;
      font-family: 'Pretendard', sans-serif;
      background: #fff;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .tool-card {
      border: 3pt solid #000;
      box-shadow: 5pt 5pt 0 #000;
      padding: 14pt 16pt;
      flex: 1;
    }
    .tag {
      display: inline-block;
      padding: 3pt 8pt;
      border: 2pt solid #000;
      font-family: 'Courier New', monospace;
      font-size: 8pt;
      font-weight: 700;
      letter-spacing: 0.1em;
    }
  </style>
</head>
<body>
  <!-- 헤더 -->
  <div style="background: #000; padding: 8pt 40pt; display: flex; justify-content: space-between; align-items: center;">
    <div style="display: flex; align-items: center; gap: 12pt;">
      <div style="background: #CCFF00; padding: 3pt 10pt;">
        <p style="font-family: 'Courier New', monospace; font-size: 8pt; font-weight: 700; color: #000;">DIFF 03</p>
      </div>
      <p style="font-family: 'Courier New', monospace; font-size: 9pt; color: #fff;">도구를 연결할 수 있다</p>
    </div>
    <p style="font-family: 'Courier New', monospace; font-size: 9pt; color: #555;">06 / 09</p>
  </div>

  <div style="flex: 1; padding: 20pt 40pt 18pt; display: flex; flex-direction: column; gap: 14pt;">
    <!-- MCP 설명 -->
    <div style="display: flex; align-items: center; gap: 16pt;">
      <div style="border: 3pt solid #000; box-shadow: 4pt 4pt 0 #000; background: #CCFF00; padding: 8pt 16pt;">
        <p style="font-size: 13pt; font-weight: 900; color: #000;">커넥터란?</p>
      </div>
      <p style="font-size: 12pt; color: #000; line-height: 1.5;">클로드 코드에 <strong>외부 도구를 연결</strong>해주는 플러그인 — 연결할수록 할 수 있는 일이 늘어난다</p>
    </div>

    <!-- 두 도구 카드 -->
    <div style="display: flex; gap: 20pt; flex: 1;">
      <!-- koica-reg -->
      <div class="tool-card" style="background: #fff;">
        <div style="display: flex; align-items: center; gap: 10pt; margin-bottom: 10pt;">
          <div style="width: 32pt; height: 32pt; background: #000; border: 2pt solid #000; display: flex; align-items: center; justify-content: center;">
            <p style="font-size: 16pt;">📋</p>
          </div>
          <div>
            <p style="font-size: 12pt; font-weight: 900; color: #000;">koica-reg</p>
            <div class="tag" style="background: #F5F500; margin-top: 3pt;">KOICA 규정 데이터</div>
          </div>
        </div>
        <ul style="padding-left: 14pt; display: flex; flex-direction: column; gap: 5pt;">
          <li style="font-size: 10pt; color: #333; font-family: 'Courier New', monospace;">인사·회계 규정 원문 조회</li>
          <li style="font-size: 10pt; color: #333; font-family: 'Courier New', monospace;">키워드로 조항 검색</li>
          <li style="font-size: 10pt; color: #333; font-family: 'Courier New', monospace;">근거 조항과 함께 답변</li>
        </ul>
        <div style="margin-top: 10pt; background: #f5f5f5; border: 1pt solid #ddd; padding: 7pt 10pt;">
          <p style="font-family: 'Courier New', monospace; font-size: 9pt; color: #555;">→ "국외출장 여비 규정 찾아줘"</p>
        </div>
      </div>

      <!-- SQLite -->
      <div class="tool-card" style="background: #fff;">
        <div style="display: flex; align-items: center; gap: 10pt; margin-bottom: 10pt;">
          <div style="width: 32pt; height: 32pt; background: #000; border: 2pt solid #000; display: flex; align-items: center; justify-content: center;">
            <p style="font-size: 16pt;">🗄️</p>
          </div>
          <div>
            <p style="font-size: 12pt; font-weight: 900; color: #000;">SQLite</p>
            <div class="tag" style="background: #CCFF00; margin-top: 3pt;">데이터베이스 직접 접근</div>
          </div>
        </div>
        <ul style="padding-left: 14pt; display: flex; flex-direction: column; gap: 5pt;">
          <li style="font-size: 10pt; color: #333; font-family: 'Courier New', monospace;">DB에 직접 SQL 쿼리</li>
          <li style="font-size: 10pt; color: #333; font-family: 'Courier New', monospace;">데이터 분석 · 집계</li>
          <li style="font-size: 10pt; color: #333; font-family: 'Courier New', monospace;">결과를 바로 해석·요약</li>
        </ul>
        <div style="margin-top: 10pt; background: #f5f5f5; border: 1pt solid #ddd; padding: 7pt 10pt;">
          <p style="font-family: 'Courier New', monospace; font-size: 9pt; color: #555;">→ "이번 달 매출 상위 10개 뽑아줘"</p>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
