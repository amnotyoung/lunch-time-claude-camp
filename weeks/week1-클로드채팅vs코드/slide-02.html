<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 720pt;
      height: 405pt;
      font-family: 'Pretendard', sans-serif;
      background: #fff;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .card {
      border: 3pt solid #000;
      box-shadow: 5pt 5pt 0 #000;
    }
    .limit-item {
      display: flex;
      align-items: flex-start;
      gap: 12pt;
      padding: 10pt 14pt;
      border: 2pt solid #000;
      box-shadow: 3pt 3pt 0 #000;
      background: #fff;
    }
    .limit-num {
      font-family: 'Courier New', monospace;
      font-size: 10pt;
      font-weight: 700;
      color: #fff;
      background: #000;
      width: 20pt;
      height: 20pt;
      min-width: 20pt;
      display: flex;
      align-items: center;
      justify-content: center;
    }
  </style>
</head>
<body>
  <!-- 헤더 -->
  <div style="background: #000; padding: 8pt 40pt; display: flex; justify-content: space-between; align-items: center;">
    <p style="font-family: 'Courier New', monospace; font-size: 9pt; color: #F5F500; letter-spacing: 0.1em;">우리가 아는 클로드 채팅</p>
    <p style="font-family: 'Courier New', monospace; font-size: 9pt; color: #fff; opacity: 0.5;">02 / 09</p>
  </div>

  <div style="flex: 1; padding: 28pt 40pt 24pt; display: flex; gap: 36pt;">
    <!-- 왼쪽: 요약 -->
    <div style="width: 240pt; display: flex; flex-direction: column; gap: 14pt;">
      <div class="card" style="background: #F5F500; padding: 16pt 18pt;">
        <p style="font-family: 'Courier New', monospace; font-size: 8pt; color: #000; letter-spacing: 0.1em; margin-bottom: 8pt;">ONE-LINE SUMMARY</p>
        <h2 style="font-size: 16pt; font-weight: 900; color: #000; line-height: 1.3;">"브라우저에서<br>대화하는 AI"</h2>
      </div>
      <div style="padding: 14pt 16pt; border: 2pt dashed #000; background: #fafafa;">
        <p style="font-size: 11pt; color: #000; line-height: 1.6;">채팅에 질문을 넣고,<br>답변을 받아서,<br>내가 직접 적용하는 방식</p>
      </div>
    </div>

    <!-- 오른쪽: 한계점 -->
    <div style="flex: 1; display: flex; flex-direction: column; gap: 8pt;">
      <div style="display: flex; align-items: center; gap: 10pt; margin-bottom: 6pt;">
        <div style="width: 4pt; height: 20pt; background: #FF2D55;"></div>
        <h3 style="font-size: 14pt; font-weight: 900; color: #000; letter-spacing: -0.01em;">하지만 이런 한계가 있다</h3>
      </div>

      <div class="limit-item">
        <div class="limit-num">1</div>
        <div>
          <p style="font-size: 12pt; font-weight: 700; color: #000; margin-bottom: 3pt;">내 파일을 직접 수정할 수 없다</p>
          <p style="font-family: 'Courier New', monospace; font-size: 10pt; color: #555;">파일을 올려서 읽을 순 있지만, 결과를 직접 저장해주진 않는다</p>
        </div>
      </div>

      <div class="limit-item">
        <div class="limit-num">2</div>
        <div>
          <p style="font-size: 12pt; font-weight: 700; color: #000; margin-bottom: 3pt;">프로젝트 단위의 깊은 맥락 유지가 어렵다</p>
          <p style="font-family: 'Courier New', monospace; font-size: 10pt; color: #555;">프로젝트 구조, 코딩 규칙 등 세밀한 맥락까지는 기억 못함</p>
        </div>
      </div>

      <div class="limit-item">
        <div class="limit-num">3</div>
        <div>
          <p style="font-size: 12pt; font-weight: 700; color: #000; margin-bottom: 3pt;">결과물을 내가 직접 적용해야 함</p>
          <p style="font-family: 'Courier New', monospace; font-size: 10pt; color: #555;">AI가 알려주면 내가 실행 — 항상 중간에 사람이 필요</p>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
