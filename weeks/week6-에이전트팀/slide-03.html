<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{width:720pt;height:405pt;font-family:'Inter','SF Pro',system-ui,-apple-system,sans-serif;background:#F8F8F2;display:grid;grid-template-columns:1fr 1fr;grid-template-rows:auto auto 1fr auto;gap:10pt;padding:20pt;overflow:hidden}
  .cell{border-radius:14pt;padding:15pt 20pt;overflow:hidden}
  .head{grid-column:1/3;background:#1A1A2E;color:#F8F8F2;display:flex;align-items:center;justify-content:space-between;padding:14pt 22pt}
  .head .num{font-size:9.5pt;font-weight:600;color:#E8FF3B;letter-spacing:0.15pt}
  .head h2{font-size:20pt;font-weight:600;letter-spacing:-0.3pt}
  .hero{grid-column:1/3;background:#E8FF3B;color:#1A1A2E;display:flex;align-items:center;justify-content:center;padding:12pt;text-align:center}
  .hero h1{font-size:29pt;font-weight:800;letter-spacing:-0.7pt}
  .col{display:flex;flex-direction:column;justify-content:center;position:relative}
  .col .badge{position:absolute;top:13pt;right:16pt;font-size:7.5pt;font-weight:800;letter-spacing:0.2pt;text-transform:uppercase;padding:3pt 8pt;border-radius:6pt}
  .col .tag{font-size:8.5pt;font-weight:700;letter-spacing:0.25pt;text-transform:uppercase;margin-bottom:6pt}
  .col h3{font-size:16pt;font-weight:800;letter-spacing:-0.4pt;margin-bottom:7pt;line-height:1.1}
  .col p{font-size:9.7pt;font-weight:500;line-height:1.45}
  .col p b{font-weight:800}
  .col .meta{margin-top:8pt;font-size:9pt;font-weight:800;padding:4pt 9pt;border-radius:6pt;align-self:flex-start}
  .dark{background:#1A1A2E;color:#F8F8F2}
  .dark .tag{color:#E8FF3B}
  .dark .badge{background:#A0A0B0;color:#1A1A2E}
  .dark .meta{background:#E8FF3B;color:#1A1A2E}
  .teal{background:#4ECDC4;color:#1A1A2E}
  .teal .tag{opacity:0.65}
  .teal .badge{background:#1A1A2E;color:#E8FF3B}
  .teal .meta{background:#1A1A2E;color:#FFE66D}
  .band{grid-column:1/3;background:#272729;color:#F8F8F2;font-size:9.3pt;font-weight:500;padding:11pt 22pt;border-radius:14pt;display:flex;align-items:center;gap:11pt;line-height:1.35}
  .band .pill{font-size:8.5pt;font-weight:800;letter-spacing:0.2pt;text-transform:uppercase;padding:3pt 9pt;border-radius:6pt;white-space:nowrap;flex-shrink:0}
  .band .t1{background:#A0A0B0;color:#1A1A2E}
  .band .t2{background:#4ECDC4;color:#1A1A2E}
  .band .seg{display:flex;align-items:center;gap:7pt}
  .band code{font-family:'SF Mono','Menlo',monospace;font-size:8pt;background:rgba(255,255,255,0.1);color:#FFE66D;padding:2pt 6pt;border-radius:4pt;font-weight:600}
  .band .vs{opacity:0.4;font-weight:800}
  .band b{color:#E8FF3B;font-weight:700}
</style>
</head>
<body>
  <div class="cell head">
    <h2>팀원은 어떻게 일하나</h2>
    <span class="num">03 / 11</span>
  </div>

  <div class="cell hero">
    <h1>머릿속은 따로, 연락은 가능</h1>
  </div>

  <div class="cell col dark">
    <span class="badge">언제나</span>
    <p class="tag">머릿속은 따로</p>
    <h3>각자 자기 작업실</h3>
    <p>팀원마다 <b>독립 컨텍스트</b>. 팀장 대화도 옆 팀원 머릿속도 못 본다 — 그래서 가볍고 안전</p>
    <span class="meta">→ 오염 방지 + 병렬</span>
  </div>
  <div class="cell col teal">
    <span class="badge">오늘 실습</span>
    <p class="tag">연락은 가능</p>
    <h3>팀원끼리 직접 의논</h3>
    <p>서로 <b>메시지</b>·공유 할 일 목록으로 교차 검토·협업 — 겹치는 이슈를 같이 푼다</p>
    <span class="meta">설정 필요</span>
  </div>

  <div class="cell band">
    <span class="pill t1">분담 · 기본</span>
    <span class="seg">결과만 보고 — <b>설정 없이</b></span>
    <span class="vs">↔</span>
    <span class="pill t2">소통형 팀 · 오늘</span>
    <span class="seg">서로 의논 — <code>CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS=1</code> 필요</span>
  </div>
</body>
</html>
