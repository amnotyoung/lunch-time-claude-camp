<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 720pt;
      height: 405pt;
      font-family: system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif;
      background: #f5f5f7;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
  </style>
</head>
<body>
  <!-- nav -->
  <div style="height: 26pt; background: #000; display: flex; align-items: center; justify-content: space-between; padding: 0 40pt; flex-shrink: 0;">
    <span style="font-size: 8.5pt; color: #636366;">워크스페이스 어디에 만들까</span>
    <span style="font-size: 8.5pt; color: #3a3a3c;">03 / 08</span>
  </div>

  <!-- main: two columns -->
  <div style="flex: 1; display: flex; gap: 0; overflow: hidden;">

    <!-- left: location options -->
    <div style="flex: 1; display: flex; flex-direction: column; justify-content: center; padding: 20pt 32pt 20pt 40pt; border-right: 0.5pt solid #d1d1d6;">
      <p style="font-size: 9pt; font-weight: 600; color: #0066cc; letter-spacing: 0.15pt; margin-bottom: 8pt;">작업 폴더 위치 선택</p>
      <h2 style="font-size: 17pt; font-weight: 600; color: #1d1d1f; letter-spacing: -0.3pt; margin-bottom: 24pt; line-height: 1.2;">먼저 폴더를 만들고<br>앱에서 연결한다</h2>

      <!-- 추천 -->
      <div style="display: flex; align-items: baseline; gap: 10pt; padding: 10pt 0; border-bottom: 0.5pt solid #e5e5ea;">
        <span style="font-size: 8pt; font-weight: 600; color: #fff; background: #0066cc; padding: 2pt 8pt; border-radius: 9999pt; flex-shrink: 0;">추천</span>
        <div>
          <p style="font-size: 9.5pt; font-weight: 600; color: #1d1d1f; margin-bottom: 2pt;">Documents\Claude Projects\</p>
          <p style="font-size: 8.5pt; color: #7a7a7a;">탐색기에서 찾기 쉽고 백업도 편리</p>
        </div>
      </div>

      <!-- 가능 -->
      <div style="display: flex; align-items: baseline; gap: 10pt; padding: 10pt 0; border-bottom: 0.5pt solid #e5e5ea;">
        <span style="font-size: 8pt; font-weight: 600; color: #3a3a3c; background: #e5e5ea; padding: 2pt 8pt; border-radius: 9999pt; flex-shrink: 0;">가능</span>
        <div>
          <p style="font-size: 9.5pt; font-weight: 600; color: #1d1d1f; margin-bottom: 2pt;">바탕화면 Claude 폴더</p>
          <p style="font-size: 8.5pt; color: #7a7a7a;">접근 빠름, 나중에 지저분해질 수 있음</p>
        </div>
      </div>

      <!-- 비추천 -->
      <div style="display: flex; align-items: baseline; gap: 10pt; padding: 10pt 0;">
        <span style="font-size: 8pt; font-weight: 600; color: #fff; background: #ff3b30; padding: 2pt 8pt; border-radius: 9999pt; flex-shrink: 0;">비추천</span>
        <div>
          <p style="font-size: 9.5pt; font-weight: 600; color: #1d1d1f; margin-bottom: 2pt;">C:\ 드라이브 루트</p>
          <p style="font-size: 8.5pt; color: #7a7a7a;">시스템 폴더와 섞이고 백업·정리 어려움</p>
        </div>
      </div>
    </div>

    <!-- right: connection flow -->
    <div style="width: 220pt; display: flex; flex-direction: column; justify-content: center; padding: 20pt 40pt 20pt 32pt;">
      <p style="font-size: 9pt; font-weight: 600; color: #1d1d1f; margin-bottom: 20pt;">앱에서 연결하기</p>

      <div style="display: flex; flex-direction: column; gap: 0; position: relative;">
        <!-- vertical line -->
        <div style="position: absolute; left: 10.5pt; top: 22pt; bottom: 22pt; width: 0.5pt; background: #d1d1d6;"></div>

        <div style="display: flex; align-items: center; gap: 14pt; margin-bottom: 18pt;">
          <div style="width: 22pt; height: 22pt; border-radius: 9999pt; background: #0066cc; display: flex; align-items: center; justify-content: center; flex-shrink: 0;">
            <span style="font-size: 9pt; font-weight: 600; color: #fff;">1</span>
          </div>
          <p style="font-size: 9.5pt; color: #1d1d1f;">탐색기에서 폴더 생성</p>
        </div>

        <div style="display: flex; align-items: center; gap: 14pt; margin-bottom: 18pt;">
          <div style="width: 22pt; height: 22pt; border-radius: 9999pt; background: #0066cc; display: flex; align-items: center; justify-content: center; flex-shrink: 0;">
            <span style="font-size: 9pt; font-weight: 600; color: #fff;">2</span>
          </div>
          <p style="font-size: 9.5pt; color: #1d1d1f;"><strong>"폴더 열기..."</strong> 클릭</p>
        </div>

        <div style="display: flex; align-items: center; gap: 14pt;">
          <div style="width: 22pt; height: 22pt; border-radius: 9999pt; background: #0066cc; display: flex; align-items: center; justify-content: center; flex-shrink: 0;">
            <span style="font-size: 9pt; font-weight: 600; color: #fff;">3</span>
          </div>
          <p style="font-size: 9.5pt; color: #1d1d1f;">폴더 선택 → 대화 시작</p>
        </div>
      </div>

      <p style="font-size: 8.5pt; color: #aeaeb2; margin-top: 24pt; line-height: 1.5;">프로젝트마다 폴더를 따로<br>만드는 습관이 좋습니다</p>
    </div>

  </div>
</body>
</html>
