<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 720pt;
      height: 405pt;
      font-family: system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif;
      background: #1d1d1f;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
  </style>
</head>
<body>
  <!-- nav -->
  <div style="height: 26pt; background: #000; display: flex; align-items: center; justify-content: space-between; padding: 0 40pt; flex-shrink: 0;">
    <span style="font-size: 8.5pt; color: #636366;">첫 실습</span>
    <span style="font-size: 8.5pt; color: #3a3a3c;">07 / 08</span>
  </div>

  <!-- main -->
  <div style="flex: 1; display: flex; flex-direction: column; justify-content: center; padding: 0 72pt 20pt;">
    <p style="font-size: 9pt; font-weight: 600; color: #0066cc; letter-spacing: 0.15pt; margin-bottom: 10pt;">직접 해봐요</p>
    <h2 style="font-size: 18pt; font-weight: 600; color: #fff; letter-spacing: -0.4pt; line-height: 1.15; margin-bottom: 6pt; padding-bottom: 2pt;">코드 탭에서는 바로 됩니다</h2>
    <p style="font-size: 12pt; font-weight: 300; color: #48484a; margin-bottom: 28pt;">코드 탭에 이렇게 입력해보세요</p>

    <div style="display: flex; flex-direction: column; gap: 10pt;">
      <div style="display: flex; align-items: center; gap: 14pt; padding: 13pt 18pt; border: 0.5pt solid rgba(255,255,255,0.1); border-radius: 10pt;">
        <span style="font-size: 13pt; flex-shrink: 0;">💬</span>
        <p style="font-family: 'Courier New', monospace; font-size: 10.5pt; color: #e5e5ea; letter-spacing: -0.1pt;">"이 폴더에 있는 파일 목록 알려줘"</p>
      </div>
      <div style="display: flex; align-items: center; gap: 14pt; padding: 13pt 18pt; border: 0.5pt solid rgba(255,255,255,0.1); border-radius: 10pt;">
        <span style="font-size: 13pt; flex-shrink: 0;">💬</span>
        <p style="font-family: 'Courier New', monospace; font-size: 10.5pt; color: #e5e5ea; letter-spacing: -0.1pt;">"바탕화면에 test.txt 파일 만들어줘"</p>
      </div>
    </div>

    <p style="font-size: 8.5pt; color: #48484a; margin-top: 20pt;">탐색기를 열지 않아도 클로드가 직접 파일을 다룹니다</p>
  </div>
</body>
</html>
