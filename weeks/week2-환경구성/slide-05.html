<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 720pt;
      height: 405pt;
      font-family: system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif;
      background: #fff;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
  </style>
</head>
<body>
  <!-- nav -->
  <div style="height: 26pt; background: #000; display: flex; align-items: center; justify-content: space-between; padding: 0 40pt; flex-shrink: 0;">
    <div style="display: flex; align-items: center; gap: 10pt;">
      <span style="font-size: 8pt; font-weight: 600; color: #fff; background: #0066cc; padding: 2pt 10pt; border-radius: 9999pt;">준비물</span>
      <span style="font-size: 8.5pt; color: #636366;">Node.js 설치하기</span>
    </div>
    <span style="font-size: 8.5pt; color: #3a3a3c;">05 / 08</span>
  </div>

  <!-- main -->
  <div style="flex: 1; display: flex; flex-direction: column; padding: 22pt 40pt 18pt;">

    <!-- header -->
    <p style="font-size: 9pt; font-weight: 600; color: #0066cc; letter-spacing: 0.15pt; margin-bottom: 4pt;">왜 Node.js가 필요한가요?</p>
    <h2 style="font-size: 16pt; font-weight: 600; color: #1d1d1f; letter-spacing: -0.3pt; line-height: 1.2; margin-bottom: 14pt; padding-bottom: 2pt;">대부분의 MCP 도구가 Node.js로 동작합니다</h2>

    <!-- 3 reasons row -->
    <div style="display: flex; gap: 10pt; margin-bottom: 16pt;">
      <div style="flex: 1; padding: 10pt 12pt; background: #f5f5f7; border-radius: 8pt;">
        <p style="font-size: 8pt; font-weight: 600; color: #0066cc; letter-spacing: 0.1pt; margin-bottom: 3pt;">①</p>
        <p style="font-size: 9pt; font-weight: 600; color: #1d1d1f; margin-bottom: 2pt;">koica-reg도 Node 기반</p>
        <p style="font-size: 8pt; color: #7a7a7a; line-height: 1.4;">다음 주 실습 커넥터가 Node.js로 동작</p>
      </div>
      <div style="flex: 1; padding: 10pt 12pt; background: #f5f5f7; border-radius: 8pt;">
        <p style="font-size: 8pt; font-weight: 600; color: #0066cc; letter-spacing: 0.1pt; margin-bottom: 3pt;">②</p>
        <p style="font-size: 9pt; font-weight: 600; color: #1d1d1f; margin-bottom: 2pt;">코드 탭이 직접 설치</p>
        <p style="font-size: 8pt; color: #7a7a7a; line-height: 1.4;">내장 터미널로 한 줄이면 끝</p>
      </div>
      <div style="flex: 1; padding: 10pt 12pt; background: #f5f5f7; border-radius: 8pt;">
        <p style="font-size: 8pt; font-weight: 600; color: #0066cc; letter-spacing: 0.1pt; margin-bottom: 3pt;">③</p>
        <p style="font-size: 9pt; font-weight: 600; color: #1d1d1f; margin-bottom: 2pt;">Week 3 준비물</p>
        <p style="font-size: 8pt; color: #7a7a7a; line-height: 1.4;">다음 주에 더 많은 MCP 도구를 설치합니다</p>
      </div>
    </div>

    <!-- divider label -->
    <p style="font-size: 8.5pt; font-weight: 600; color: #aeaeb2; letter-spacing: 0.15pt; margin-bottom: 8pt;">CLAUDE에게 시키기</p>

    <!-- chat command -->
    <div style="display: flex; align-items: center; gap: 14pt; padding: 14pt 18pt; border: 0.5pt solid #d1d1d6; border-radius: 10pt; background: #fff;">
      <span style="font-size: 14pt; flex-shrink: 0;">💬</span>
      <p style="font-family: 'Courier New', monospace; font-size: 11pt; color: #1d1d1f; letter-spacing: -0.1pt;">"Node.js LTS 버전 설치해줘"</p>
    </div>

    <!-- flow note -->
    <div style="display: flex; align-items: center; gap: 10pt; margin-top: 10pt;">
      <span style="font-size: 8pt; color: #aeaeb2;">→</span>
      <p style="font-size: 8.5pt; color: #7a7a7a;">코드 탭이 다운로드 · 설치 · 버전 확인까지 알아서 진행합니다</p>
    </div>

  </div>
</body>
</html>
