<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 720pt;
      height: 405pt;
      font-family: system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif;
      background: #fff;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
  </style>
</head>
<body>
  <!-- nav -->
  <div style="height: 26pt; background: #000; display: flex; align-items: center; justify-content: space-between; padding: 0 40pt; flex-shrink: 0;">
    <span style="font-size: 8.5pt; color: #636366; letter-spacing: 0.05pt;">설치하기 — Windows</span>
    <span style="font-size: 8.5pt; color: #3a3a3c;">02 / 08</span>
  </div>

  <!-- main: two columns -->
  <div style="flex: 1; display: flex; overflow: hidden;">

    <!-- left: steps -->
    <div style="width: 320pt; display: flex; flex-direction: column; justify-content: center; padding: 16pt 24pt 16pt 40pt; border-right: 0.5pt solid #f0f0f0; flex-shrink: 0;">

      <div style="display: flex; align-items: center; gap: 14pt; padding: 9pt 0; border-bottom: 0.5pt solid #f0f0f0;">
        <div style="width: 22pt; height: 22pt; border-radius: 9999pt; background: #0066cc; display: flex; align-items: center; justify-content: center; flex-shrink: 0;">
          <span style="font-size: 9pt; font-weight: 600; color: #fff;">1</span>
        </div>
        <div style="flex: 1;">
          <p style="font-size: 10pt; font-weight: 600; color: #1d1d1f; margin-bottom: 1pt;">앱 다운로드</p>
          <p style="font-size: 8pt; color: #7a7a7a;">claude.ai/download → Windows</p>
        </div>
      </div>

      <div style="display: flex; align-items: center; gap: 14pt; padding: 9pt 0; border-bottom: 0.5pt solid #f0f0f0;">
        <div style="width: 22pt; height: 22pt; border-radius: 9999pt; background: #0066cc; display: flex; align-items: center; justify-content: center; flex-shrink: 0;">
          <span style="font-size: 9pt; font-weight: 600; color: #fff;">2</span>
        </div>
        <div style="flex: 1;">
          <p style="font-size: 10pt; font-weight: 600; color: #1d1d1f; margin-bottom: 1pt;">앱 설치 &amp; 실행</p>
          <p style="font-size: 8pt; color: #7a7a7a;">설치 마법사 진행 → 데스크톱 아이콘 실행</p>
        </div>
      </div>

      <div style="display: flex; align-items: center; gap: 14pt; padding: 9pt 0; border-bottom: 0.5pt solid #f0f0f0;">
        <div style="width: 22pt; height: 22pt; border-radius: 9999pt; background: #0066cc; display: flex; align-items: center; justify-content: center; flex-shrink: 0;">
          <span style="font-size: 9pt; font-weight: 600; color: #fff;">3</span>
        </div>
        <div style="flex: 1;">
          <p style="font-size: 10pt; font-weight: 600; color: #1d1d1f; margin-bottom: 1pt;">로그인</p>
          <p style="font-size: 8pt; color: #7a7a7a;">Anthropic 계정으로 브라우저 인증</p>
        </div>
      </div>

      <div style="display: flex; align-items: center; gap: 14pt; padding: 9pt 0;">
        <div style="width: 22pt; height: 22pt; border-radius: 9999pt; background: #ff3b30; display: flex; align-items: center; justify-content: center; flex-shrink: 0;">
          <span style="font-size: 9pt; font-weight: 600; color: #fff;">4</span>
        </div>
        <div style="flex: 1;">
          <p style="font-size: 10pt; font-weight: 600; color: #1d1d1f; margin-bottom: 1pt;">개인정보보호 설정 <span style="font-size: 7.5pt; font-weight: 400; color: #ff3b30; margin-left: 3pt;">로그인 직후</span></p>
          <p style="font-size: 8pt; color: #7a7a7a;">"Claude 개선에 도움주기" 끄기</p>
        </div>
      </div>

      <div style="margin-top: 10pt; padding-top: 8pt; border-top: 0.5pt solid #f0f0f0;">
        <p style="font-size: 7.5pt; color: #aeaeb2;">기본값이 켜져 있으므로 반드시 직접 꺼야 합니다</p>
      </div>
    </div>

    <!-- right: two stacked screenshots, fixed heights -->
    <div style="flex: 1; display: flex; flex-direction: column; padding: 18pt 24pt; background: #fafafa; gap: 14pt; overflow: hidden;">

      <div style="flex: 1; display: flex; flex-direction: column; min-height: 0;">
        <p style="font-size: 7.5pt; font-weight: 600; color: #0066cc; letter-spacing: 0.1pt; margin-bottom: 5pt;">① 다운로드 페이지</p>
        <div style="flex: 1; min-height: 0; display: flex; align-items: flex-start; justify-content: center;">
          <img src="./assets/image-1777380233016.png"
               style="max-width: 100%; max-height: 100%; object-fit: contain; object-position: top; border-radius: 5pt; box-shadow: 0 1pt 6pt rgba(0,0,0,0.10);"
               alt="Claude 다운로드 페이지">
        </div>
      </div>

      <div style="flex: 1; display: flex; flex-direction: column; min-height: 0;">
        <p style="font-size: 7.5pt; font-weight: 600; color: #ff3b30; letter-spacing: 0.1pt; margin-bottom: 5pt;">④ 개인정보보호 설정</p>
        <div style="flex: 1; min-height: 0; display: flex; align-items: flex-start; justify-content: center;">
          <img src="./assets/screenshot-privacy.png"
               style="max-width: 100%; max-height: 100%; object-fit: contain; object-position: top; border-radius: 5pt; box-shadow: 0 1pt 6pt rgba(0,0,0,0.10);"
               alt="개인정보보호 설정 화면">
        </div>
      </div>

    </div>

  </div>
</body>
</html>
