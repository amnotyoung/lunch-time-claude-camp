<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{width:720pt;height:405pt;font-family:'Inter','SF Pro',system-ui,-apple-system,sans-serif;background:#F8F8F2;display:grid;grid-template-columns:1.6fr 1fr;grid-template-rows:1fr 1fr;gap:10pt;padding:20pt;overflow:hidden}
  .cell{border-radius:14pt;padding:24pt;display:flex;flex-direction:column;justify-content:space-between;overflow:hidden}
  .anchor{grid-row:1/3;background:#1A1A2E;color:#F8F8F2}
  .anchor .label{font-size:9pt;font-weight:600;color:#E8FF3B;letter-spacing:0.2pt;margin-bottom:10pt}
  .anchor h1{font-size:32pt;font-weight:600;letter-spacing:-0.6pt;line-height:1.15;margin-bottom:14pt}
  .anchor p{font-size:11pt;line-height:1.5;color:#A0A0B0}
  .anchor .date{margin-top:18pt;display:inline-block;font-size:9pt;font-weight:600;color:#1A1A2E;background:#E8FF3B;padding:4pt 12pt;border-radius:9999pt;letter-spacing:0.15pt;align-self:flex-start}
  .next{background:#FFE66D;color:#1A1A2E}
  .next .label{font-size:8pt;letter-spacing:0.15pt;font-weight:700;text-transform:uppercase;margin-bottom:6pt}
  .next h3{font-size:14pt;font-weight:600;letter-spacing:-0.2pt;line-height:1.3}
  .next p{font-size:9.5pt;line-height:1.4;margin-top:8pt}
  .closing{background:#4ECDC4;color:#1A1A2E}
  .closing .label{font-size:8pt;letter-spacing:0.15pt;font-weight:700;text-transform:uppercase;margin-bottom:6pt}
  .closing h3{font-size:14pt;font-weight:600;letter-spacing:-0.2pt;line-height:1.3}
  .closing p{font-size:9.5pt;line-height:1.4;margin-top:8pt}
</style>
</head>
<body>
  <div class="cell anchor">
    <div>
      <p class="label">NEXT — WEEK #4</p>
      <h1>나만의 스킬을<br>만들어 보자</h1>
      <p>koica-reg + Python으로<br>코이카 규정 원문을<br>텍스트 마이닝하는 스킬</p>
    </div>
    <span class="date">2026.05.18주</span>
  </div>
  <div class="cell next">
    <p class="label">오늘의 누적</p>
    <h3>Python 환경 +<br>koica-reg 연결</h3>
    <p>조문 검색·인용 검증 체험이 다음 주 스킬의 재료</p>
  </div>
  <div class="cell closing">
    <p class="label">한 줄 요약</p>
    <h3>한 패턴을 익히면<br>생태계 전체가 열린다</h3>
    <p>점심시간 클로드 캠프 · WEEK #3</p>
  </div>
</body>
</html>
