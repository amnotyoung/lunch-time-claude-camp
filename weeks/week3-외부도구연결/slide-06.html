<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{width:720pt;height:405pt;font-family:'Inter','SF Pro',system-ui,-apple-system,sans-serif;background:#F8F8F2;display:grid;grid-template-columns:1fr 1fr 1fr;grid-template-rows:auto 1fr auto;gap:10pt;padding:20pt;overflow:hidden}
  .cell{border-radius:14pt;padding:16pt 20pt;overflow:hidden}
  .head{grid-column:1/4;background:#1A1A2E;color:#F8F8F2;display:flex;align-items:center;justify-content:space-between;padding:14pt 22pt}
  .head .num{font-size:9.5pt;font-weight:600;color:#E8FF3B}
  .head h2{font-size:18pt;font-weight:600;letter-spacing:-0.3pt}
  .main{grid-column:1/3;background:#E8FF3B;color:#1A1A2E;display:flex;flex-direction:column;justify-content:center}
  .main .label{font-size:8.5pt;letter-spacing:0.2pt;font-weight:700;text-transform:uppercase;margin-bottom:8pt}
  .main h3{font-size:18pt;font-weight:600;letter-spacing:-0.3pt;line-height:1.25;margin-bottom:14pt}
  .main .cmd{background:#1A1A2E;color:#E8FF3B;font-family:'SF Mono',Menlo,monospace;font-size:11pt;padding:12pt 14pt;border-radius:8pt;line-height:1.5}
  .main .var{color:#FF6B6B}
  .topics{background:#FF6B6B;color:#F8F8F2;display:flex;flex-direction:column;justify-content:center}
  .topics .label{font-size:8pt;letter-spacing:0.15pt;font-weight:700;text-transform:uppercase;opacity:0.85;margin-bottom:8pt}
  .topics ul{list-style:none;font-size:10pt;line-height:1.7}
  .topics li::before{content:"· ";font-weight:700}
  .topics .free{margin-top:8pt;padding-top:8pt;border-top:0.5pt solid rgba(248,248,242,0.3);font-size:10pt;font-weight:600}
  .out{grid-column:1/4;background:#4ECDC4;color:#1A1A2E;display:flex;align-items:center;justify-content:space-between;padding:12pt 22pt}
  .out .label{font-size:8.5pt;letter-spacing:0.15pt;font-weight:700;text-transform:uppercase;margin-right:10pt}
  .out .file{font-family:'SF Mono',Menlo,monospace;font-size:11pt;font-weight:600}
  .out .note{font-size:9pt;opacity:0.75}
</style>
</head>
<body>
  <div class="cell head">
    <h2>실습 ①: 자연어로 조문 검색</h2>
    <span class="num">06 / 10</span>
  </div>
  <div class="cell main">
    <p class="label">데모 명령</p>
    <h3>자연어 한 줄로<br>정확한 조문 + 본문이 즉시</h3>
    <div class="cmd">"KOICA <span class="var">인사규정 채용 결격사유</span><br>알려줘"</div>
  </div>
  <div class="cell topics">
    <p class="label">주제 예시 (본인 업무 자유)</p>
    <ul>
      <li>국외여비 일비 기준</li>
      <li>사업평가 절차</li>
      <li>인사위원회 구성</li>
      <li>해외봉사단 파견 요건</li>
    </ul>
    <p class="free">자유 — 내가 헷갈렸던 조문</p>
  </div>
  <div class="cell out">
    <div><span class="label">호출</span><span class="file">search_regulation → get_article</span></div>
    <span class="note">정답 조문 본문 전체 즉시 반환</span>
  </div>
</body>
</html>
